    <text x="1742" y="486" fill="#BBC6DB" font-size="21" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1742" dy="0">worker</tspan><tspan x="1742" dy="28">can build stems</tspan><tspan x="1742" dy="28">and run</tspan><tspan x="1742" dy="28">analysis again</tspan></text>
  

