    <text x="144" y="504" fill="#BBC6DB" font-size="24" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="144" dy="0">User asks for symbolic</tspan><tspan x="144" dy="28">extraction.</tspan></text>
  
