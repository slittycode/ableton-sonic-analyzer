  <text x="92" y="116" fill="#7E8AA4" font-size="18" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="1.4"><tspan x="92" dy="0">CRITICAL LEAK</tspan></text>
  <text x="92" y="180" fill="#F4F7FB" font-size="58" font-weight="550" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="92" dy="0">The pipeline cheats: symbolic work leaks into measurement, then runs again later.</tspan></text>
  <text x="92" y="244" fill="#BBC6DB" font-size="25" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="92" dy="0">This is the most expensive fake cleanliness in Phase 1. The architecture looks cleaner than the execution path actually is.</tspan></text>
  <text x="1842" y="120" fill="#BBC6DB" font-size="22" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="end" letter-spacing="0.8"><tspan x="1842" dy="0">4 / 7</tspan></text>
  <line x1="92" y1="206" x2="1828" y2="206" stroke="url(#lineGrad)" stroke-width="2" />
  
    
