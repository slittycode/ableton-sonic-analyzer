    <text x="124" y="748" fill="#FF6A62" font-size="112" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="1.4"><tspan x="124" dy="0">YOU PAY TWICE</tspan></text>
    
    <rect x="120" y="806" width="540" height="164" rx="24" ry="24" fill="#191620" stroke="#FF6A62" stroke-width="2" />
    
    <text x="148" y="862" fill="#F4F7FB" font-size="34" font-weight="600" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="148" dy="0">Why this matters</tspan></text>
    <text x="148" y="908" fill="#BBC6DB" font-size="23" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="148" dy="0">Measurement is supposed to define truth.</tspan><tspan x="148" dy="31">Right now it still performs symbolic-capable work</tspan><tspan x="148" dy="31">and only sanitizes it at persistence time.</tspan></text>
  
    
    <rect x="690" y="806" width="540" height="164" rx="24" ry="24" fill="#171B24" stroke="#FF6A62" stroke-width="2" />
    
    <text x="718" y="862" fill="#F4F7FB" font-size="34" font-weight="600" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="718" dy="0">Operational cost</tspan></text>
    <text x="718" y="908" fill="#BBC6DB" font-size="23" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="718" dy="0">If stems or transcription are rerun later, the system</tspan><tspan x="718" dy="31">pays extra latency and compute for a boundary it is</tspan><tspan x="718" dy="31">pretending is already clean.</tspan></text>
  
    
    <rect x="1260" y="806" width="626" height="164" rx="24" ry="24" fill="#122312" stroke="#C9FF2F" stroke-width="2" />
    
    <text x="1288" y="862" fill="#F4F7FB" font-size="34" font-weight="600" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1288" dy="0">Best fix</tspan></text>
    <text x="1288" y="908" fill="#BBC6DB" font-size="23" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1288" dy="0">Keep measurement measurement-only. Let symbolic own</tspan><tspan x="1288" dy="31">symbolic. Reuse stems instead of recomputing them.</tspan></text>
  
  
  <text x="88" y="1038" fill="#7E8AA4" font-size="16" font-weight="500" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0.2"><tspan x="88" dy="0">Observed in analysis_runtime.py:resolve_measurement_flags and complete_measurement, analyze.py optional transcription path, and server.py symbolic worker.</tspan></text>
