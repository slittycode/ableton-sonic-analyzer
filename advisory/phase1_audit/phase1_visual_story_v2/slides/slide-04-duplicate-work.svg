    <text x="1200" y="494" fill="#BBC6DB" font-size="22" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1200" dy="0">Persists canonical measurement and</tspan><tspan x="1200" dy="30">strips `transcriptionDetail` late.</tspan></text>
  
