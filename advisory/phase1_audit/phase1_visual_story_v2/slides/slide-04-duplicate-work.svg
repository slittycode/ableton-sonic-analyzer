    <text x="654" y="472" fill="#BBC6DB" font-size="22" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="654" dy="0">Loads audio</tspan><tspan x="654" dy="30">Optional Demucs</tspan><tspan x="654" dy="30">Detector pass</tspan><tspan x="654" dy="30">Optional transcription</tspan></text>
  
