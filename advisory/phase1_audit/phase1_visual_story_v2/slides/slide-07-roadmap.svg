  <text x="92" y="116" fill="#7E8AA4" font-size="18" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="1.4"><tspan x="92" dy="0">EXECUTIVE CLOSE</tspan></text>
  <text x="92" y="180" fill="#F4F7FB" font-size="58" font-weight="550" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="92" dy="0">30 / 60 / 90 day priority path.</tspan></text>
  <text x="92" y="244" fill="#BBC6DB" font-size="25" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="92" dy="0">This is a cleanup-first roadmap, not a rewrite roadmap.</tspan></text>
  <text x="1842" y="120" fill="#BBC6DB" font-size="22" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="end" letter-spacing="0.8"><tspan x="1842" dy="0">7 / 7</tspan></text>
  <line x1="92" y1="206" x2="1828" y2="206" stroke="url(#lineGrad)" stroke-width="2" />
  
    
    <rect x="118" y="336" width="1164" height="124" rx="24" ry="24" fill="#C9FF2F" />
    <text x="154" y="400" fill="#10141B" font-size="42" font-weight="750" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="154" dy="0">30 DAYS</tspan></text>
    <text x="308" y="396" fill="#10141B" font-size="24" font-weight="550" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="308" dy="0">Remove measurement-time transcription from symbolic-requested runs.</tspan><tspan x="308" dy="32">Add a canonical estimate flow to analysis-runs.</tspan></text>
  
    
    <rect x="118" y="522" width="1164" height="124" rx="24" ry="24" fill="#6BD8FF" />
    <text x="154" y="586" fill="#10141B" font-size="42" font-weight="750" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="154" dy="0">60 DAYS</tspan></text>
    <text x="308" y="582" fill="#10141B" font-size="24" font-weight="550" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="308" dy="0">Persist and reuse stems.</tspan><tspan x="308" dy="32">Implement one torchcrepe backend experiment behind TranscriptionBackend.</tspan></text>
  
    
    <rect x="118" y="708" width="1164" height="124" rx="24" ry="24" fill="#7D97FF" />
    <text x="154" y="772" fill="#F6FAFF" font-size="42" font-weight="750" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="154" dy="0">90 DAYS</tspan></text>
    <text x="308" y="768" fill="#F6FAFF" font-size="24" font-weight="550" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="308" dy="0">Tier or prune low-value Phase 1 fields.</tspan><tspan x="308" dy="32">Make a go / no-go call on scaling symbolic extraction further.</tspan></text>
  

    
    <rect x="1320" y="360" width="492" height="258" rx="24" ry="24" fill="#191C27" stroke="#FF6A62" stroke-width="2" />
    <rect x="1338" y="378" width="180" height="22" rx="11" ry="11" fill="#F1EEE6" />
    <text x="1348" y="448" fill="#F4F7FB" font-size="42" font-weight="600" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1348" dy="0">Final verdict</tspan></text>
    <text x="1348" y="492" fill="#BBC6DB" font-size="28" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1348" dy="0">Phase 1 is only partially realized.</tspan><tspan x="1348" dy="34"></tspan><tspan x="1348" dy="34">The authoritative core is solid.</tspan><tspan x="1348" dy="34">The execution boundary is not yet clean.</tspan><tspan x="1348" dy="34">Spend on cleanup before expansion.</tspan></text>
  
    
    <rect x="1320" y="658" width="492" height="214" rx="24" ry="24" fill="#181B23" stroke="#FFB357" stroke-width="2" />
    
    <text x="1348" y="714" fill="#F4F7FB" font-size="36" font-weight="600" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1348" dy="0">What not to do</tspan></text>
    <text x="1348" y="760" fill="#BBC6DB" font-size="25" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1348" dy="0">Do not redesign the whole product.</tspan><tspan x="1348" dy="34">Do not add more detector breadth until</tspan><tspan x="1348" dy="34">the Phase 1 contract is clean.</tspan></text>
  
    <rect x="1364" y="916" width="396" height="54" rx="18" ry="18" fill="#C9FF2F" />
    <text x="1562" y="951" fill="#10141B" font-size="21" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="middle" letter-spacing="0"><tspan x="1562" dy="0">Clean boundary. Reuse stems. Run one decisive experiment.</tspan></text>
  
  <text x="88" y="1038" fill="#7E8AA4" font-size="16" font-weight="500" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0.2"><tspan x="88" dy="0">Synthesis of repo code, targeted tests, field-utilization analysis, and primary-source external tooling research.</tspan></text>
