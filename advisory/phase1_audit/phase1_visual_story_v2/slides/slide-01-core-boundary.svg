    <text x="120" y="742" fill="#BBC6DB" font-size="25" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="120" dy="0">Canonical measurement is real, persisted, and</tspan><tspan x="120" dy="34">consumed downstream. Tests prove the runtime strips</tspan><tspan x="120" dy="34">leaked symbolic output before persistence.</tspan></text>
  
    
    <rect x="650" y="640" width="580" height="234" rx="24" ry="24" fill="#111A28" stroke="#24334C" stroke-width="2" />
    
    <text x="678" y="696" fill="#F4F7FB" font-size="34" font-weight="600" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="678" dy="0">What is constrained</tspan></text>
    <text x="678" y="742" fill="#BBC6DB" font-size="25" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="678" dy="0">Product-facing Phase 1 still mixes truth, compatibility,</tspan><tspan x="678" dy="34">and optional symbolic projections into one user-visible</tspan><tspan x="678" dy="34">concept. The code is cleaner than the product story.</tspan></text>
  
    
    <rect x="1250" y="640" width="578" height="234" rx="24" ry="24" fill="#111A28" stroke="#24334C" stroke-width="2" />
    
