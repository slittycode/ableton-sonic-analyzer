  <text x="92" y="116" fill="#7E8AA4" font-size="18" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="1.4"><tspan x="92" dy="0">EXECUTIVE READ-ONLY AUDIT</tspan></text>
  <text x="92" y="180" fill="#F4F7FB" font-size="58" font-weight="550" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="92" dy="0">Phase 1 has a real core. It does not yet have a clean boundary.</tspan></text>
  <text x="92" y="244" fill="#BBC6DB" font-size="25" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="92" dy="0">This program measures first, interprets second. The strongest next investment is architectural cleanup, not detector sprawl.</tspan></text>
