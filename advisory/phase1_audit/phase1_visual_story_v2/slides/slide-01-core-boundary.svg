    <text x="1278" y="742" fill="#BBC6DB" font-size="25" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1278" dy="0">Fund contract cleanup before funding new detector work.</tspan><tspan x="1278" dy="34">The highest-value step is boundary repair, not capability</tspan><tspan x="1278" dy="34">sprawl.</tspan></text>
  
    
