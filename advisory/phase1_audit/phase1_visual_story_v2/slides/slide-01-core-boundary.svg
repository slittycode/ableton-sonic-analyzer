    <text x="1146" y="474" fill="#19343E" font-size="21" font-weight="450" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" text-anchor="start" letter-spacing="0"><tspan x="1146" dy="0">AI advice is grounded on</tspan><tspan x="1146" dy="28">measurement. Symbolic</tspan><tspan x="1146" dy="28">only enriches it when present.</tspan></text>
  
    
