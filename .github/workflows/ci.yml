name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests
      - name: Assert no wrong-interpreter pyc files
        run: |
          BAD=$(
            find __pycache__ scripts/__pycache__ -name '*.pyc' 2>/dev/null \
              | grep -v 'cpython-311' || true
          )
          if [ -n "$BAD" ]; then
            echo "ERROR: Found pyc files compiled by the wrong Python interpreter:"
            echo "$BAD"
            exit 1
          fi
